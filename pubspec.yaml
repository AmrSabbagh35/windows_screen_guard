name: windows_screen_guard
description: Prevent screen capture, recording, and PrintScreen on Flutter Windows apps using the Windows display affinity API — the same method used by Netflix and banking apps.
version: 0.1.2
homepage: https://github.com/AmrSabbagh35/windows_screen_guard
repository: https://github.com/AmrSabbagh35/windows_screen_guard
issue_tracker: https://github.com/AmrSabbagh35/windows_screen_guard/issues

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

